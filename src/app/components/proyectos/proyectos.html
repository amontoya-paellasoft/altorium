<div class="proyectos-container">
  <!-- Header / Filters Area -->
  <header class="main-header">
    <div class="header-top">
      <button class="btn-back" (click)="goBack()">
        <fa-icon [icon]="faArrowLeft"></fa-icon> {{ 'USERS.BTN_BACK' | translate }}
      </button>
      <div class="header-titles">
        <h1>{{ 'PROYECTOS.TITLE' | translate }}</h1>
        <p>{{ 'PROYECTOS.SUBTITLE' | translate }}</p>
      </div>
      <button class="btn-primary-dark" (click)="openNewDrawer()">
        {{ 'PROYECTOS.NEW_PROJECT' | translate }}
      </button>
    </div>

    <div class="filters-bar">
      <div class="search-wrapper">
        <fa-icon [icon]="faSearch" class="search-icon"></fa-icon>
        <input 
          type="text" 
          [ngModel]="svc.searchTerm()" 
          (ngModelChange)="svc.searchTerm.set($event)"
          [placeholder]="'PROYECTOS.FILTERS.SEARCH' | translate"
          class="search-input"
        >
      </div>
      <!-- Filtros -->
      <div class="select-group">
        <label>{{ 'PROYECTOS.FILTERS.COMPANY' | translate }}</label>
        <select [ngModel]="svc.companyFilter()" (ngModelChange)="svc.companyFilter.set($event)" class="filter-select">
          <option value="">{{ 'PROYECTOS.FILTERS.ALL_COMPANIES' | translate }}</option>
          <option value="31">Empresa 31</option>
        </select>
      </div>
      <button class="btn-clear" (click)="clearFilters()">
        <fa-icon [icon]="faFilter"></fa-icon> {{ 'PROYECTOS.FILTERS.CLEAR' | translate }}
      </button>
    </div>
  </header>

  <!-- Content Area -->
  <div class="content-body">
    <!-- Desktop Table -->
    @if (!isLoading() && !error() && svc.filteredProyectos().length > 0) {
      <app-proyecto-table 
        [proyectos]="svc.filteredProyectos()"
        (view)="openDetails($any($event))"
        (edit)="openEditDrawer($any($event))"
        (delete)="openDeleteModal($any($event))"
      ></app-proyecto-table>
    }
  </div>

  <!-- Side Panels -->
  @if (drawerOpen()) {
    <app-proyecto-drawer
      [isEditing]="overlay.isEditing()"
      [data]="overlay.editingProject()"
      (close)="overlay.drawerOpen.set(false)"
      (saveAction)="handleSave($event)"
    ></app-proyecto-drawer>
  }

  @if (detailsOpen()) {
    <app-proyecto-details
      [p]="selectedProyecto()!"
      (close)="detailsOpen.set(false)"
      (edit)="detailsOpen.set(false); openEditDrawer(selectedProyecto()!)"
      (delete)="detailsOpen.set(false); openDeleteModal(selectedProyecto()!)"
    ></app-proyecto-details>
  }

  @if (deleteModalOpen()) {
    <app-proyecto-delete-modal
      [proyecto]="selectedProyecto()!"
      (close)="overlay.modalDeleteOpen.set(false)"
      (confirm)="handleDelete()"
    ></app-proyecto-delete-modal>
  }
</div>
