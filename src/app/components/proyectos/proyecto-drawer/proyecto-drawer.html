<div class="drawer-overlay" (click)="close.emit()">
  <div class="drawer-panel" (click)="$event.stopPropagation()">
    <div class="drawer-header">
      <h2>{{ isEditing ? 'Editar proyecto' : 'Nuevo proyecto' }}</h2>
      <button class="btn-close" (click)="close.emit()">
        <fa-icon [icon]="faTimes"></fa-icon>
      </button>
    </div>

    <div class="drawer-content">
      <form (ngSubmit)="save()">
        
        <div class="form-row" [class.has-alias]="isEditing">
          <div class="form-group company-group">
            <label>Empresa <span class="required">*</span></label>
            <select [(ngModel)]="model.companyId" name="companyId" required class="form-control">
              <option value="31">Empresa 31</option>
              <option value="32">Empresa 32</option>
              <option value="33">Empresa 33</option>
            </select>
          </div>
          
          <div class="form-group alias-group">
            <label>Alias</label>
            <input type="text" [(ngModel)]="model.alias" name="alias" class="form-control" [readonly]="isEditing" [placeholder]="isEditing ? '' : 'ej. portal-001'">
          </div>
        </div>

        <div class="form-group">
          <label>Nombre del proyecto <span class="required">*</span></label>
          <input type="text" [(ngModel)]="model.domainName" name="domainName" class="form-control" placeholder="Ej. Portal Cliente" required>
        </div>

        <div class="form-group">
          <label>URL del dominio <span class="required">*</span></label>
          <input type="url" [(ngModel)]="model.domainUrl" name="domainUrl" class="form-control" placeholder="https://ejemplo.com" required>
        </div>

        <div class="form-group">
          <label>Tipo de proyecto</label>
          <select [(ngModel)]="model.projectType" name="projectType" class="form-control">
            <option value="SPRING_BOOT">SPRING_BOOT</option>
            <option value="ODOO">ODOO</option>
          </select>
        </div>

        <div class="form-group inline-group">
          <label>Proyecto inactivo</label>
          <label class="switch">
            <input type="checkbox" [(ngModel)]="model.inactiveFlag" name="inactiveFlag">
            <span class="slider round"></span>
          </label>
        </div>

        <div class="form-group">
          <label>Alt imagen (opcional)</label>
          <input type="text" [(ngModel)]="model.altImage" name="altImage" class="form-control" placeholder="banner-portal-cliente.png" maxlength="290" (input)="updateCharCount()">
          <div class="char-count">{{ charCount }}/290</div>
        </div>

      </form>
    </div>

    <div class="drawer-footer">
      <button type="button" class="btn-cancel" (click)="close.emit()">CANCELAR</button>
      <button type="button" class="btn-save" (click)="save()">GUARDAR</button>
    </div>
  </div>
</div>
