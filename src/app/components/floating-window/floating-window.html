<div
  class="window-frame"
  [class.general]="esGeneral"
  [class.privada]="!esGeneral"
  cdkDrag
  (mousedown)="ws.focus(agentId())"
>
  <div class="window-header" cdkDragHandle>
    <span class="title">
      {{
        agentId()
          ? ('MAP_AGENTS.WINDOW_6001_TERMINAL_TITLE' | translate: { id: agentId() })
          : ('MAP_AGENTS.WINDOW_6002_SYSTEM_TITLE' | translate)
      }}
    </span>
    <button class="close-btn" (click)="ws.cerrar(agentId())">✕</button>
  </div>
  <div class="window-content">
    <app-chat [agentId]="agentId()" />
  </div>
</div>
