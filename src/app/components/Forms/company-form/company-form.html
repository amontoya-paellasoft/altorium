<div class="form-container">
  <div class="form-header">
    <h2>{{ 'COMPANY.FORM.TITLE' | translate }}</h2>
    <p>{{ 'COMPANY.FORM.SUBTITLE' | translate }}</p>
  </div>

  <form [formGroup]="companyForm" (ngSubmit)="onSubmit()" class="premium-form">
    <div class="form-content-scroll">
      <!-- Basic Information -->
      <div class="form-section">
        <h3 class="section-title"><i class="fas fa-building"></i> {{ 'COMPANY.FORM.SECTIONS.BASIC' | translate }}</h3>
        <div class="form-grid">
          <div class="form-field span-2">
            <label for="companyName">{{ 'COMPANY.FORM.FIELDS.NAME' | translate }}*</label>
            <input id="companyName" type="text" formControlName="companyName" 
                   [class.invalid]="companyForm.get('companyName')?.invalid && companyForm.get('companyName')?.touched"
                   placeholder="e.g. Altorium Corp">
          </div>

          <div class="form-field span-2">
            <label for="legalName">{{ 'COMPANY.FORM.FIELDS.LEGAL_NAME' | translate }}*</label>
            <input id="legalName" type="text" formControlName="legalName"
                   [class.invalid]="companyForm.get('legalName')?.invalid && companyForm.get('legalName')?.touched">
          </div>

          <div class="form-field span-2">
            <label for="taxId">{{ 'COMPANY.FORM.FIELDS.TAX_ID' | translate }}*</label>
            <input id="taxId" type="text" formControlName="taxId"
                   [class.invalid]="companyForm.get('taxId')?.invalid && companyForm.get('taxId')?.touched">
          </div>

          <div class="form-field span-2">
            <label for="sector">{{ 'COMPANY.FORM.FIELDS.SECTOR' | translate }}</label>
            <select id="sector" formControlName="sector">
              <option value="Technology">Technology</option>
              <option value="Finance">Finance</option>
              <option value="Healthcare">Healthcare</option>
              <option value="Education">Education</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Contact Details -->
      <div class="form-section">
        <h3 class="section-title"><i class="fas fa-envelope"></i> {{ 'COMPANY.FORM.SECTIONS.CONTACT' | translate }}</h3>
        <div class="form-grid">
          <div class="form-field span-2">
            <label for="email">{{ 'COMPANY.FORM.FIELDS.EMAIL' | translate }}*</label>
            <input id="email" type="email" formControlName="email"
                   [class.invalid]="companyForm.get('email')?.invalid && companyForm.get('email')?.touched">
          </div>

          <div class="form-field">
            <label for="phone">{{ 'COMPANY.FORM.FIELDS.PHONE' | translate }}*</label>
            <input id="phone" type="tel" formControlName="phone"
                   [class.invalid]="companyForm.get('phone')?.invalid && companyForm.get('phone')?.touched">
          </div>

          <div class="form-field">
            <label for="website">{{ 'COMPANY.FORM.FIELDS.WEBSITE' | translate }}</label>
            <input id="website" type="url" formControlName="website" placeholder="https://...">
          </div>
        </div>
      </div>

      <!-- Address -->
      <div class="form-section" formGroupName="address">
        <h3 class="section-title"><i class="fas fa-map-marker-alt"></i> {{ 'COMPANY.FORM.SECTIONS.ADDRESS' | translate }}</h3>
        <div class="form-grid">
          <div class="form-field span-2">
            <label for="street">{{ 'COMPANY.FORM.FIELDS.STREET' | translate }}*</label>
            <input id="street" type="text" formControlName="street"
                   [class.invalid]="companyForm.get('address.street')?.invalid && companyForm.get('address.street')?.touched">
          </div>

          <div class="form-field">
            <label for="city">{{ 'COMPANY.FORM.FIELDS.CITY' | translate }}*</label>
            <input id="city" type="text" formControlName="city"
                   [class.invalid]="companyForm.get('address.city')?.invalid && companyForm.get('address.city')?.touched">
          </div>

          <div class="form-field">
            <label for="state">{{ 'COMPANY.FORM.FIELDS.STATE' | translate }}*</label>
            <input id="state" type="text" formControlName="state"
                   [class.invalid]="companyForm.get('address.state')?.invalid && companyForm.get('address.state')?.touched">
          </div>

          <div class="form-field">
            <label for="zipCode">{{ 'COMPANY.FORM.FIELDS.ZIP' | translate }}*</label>
            <input id="zipCode" type="text" formControlName="zipCode"
                   [class.invalid]="companyForm.get('address.zipCode')?.invalid && companyForm.get('address.zipCode')?.touched">
          </div>

          <div class="form-field">
            <label for="country">{{ 'COMPANY.FORM.FIELDS.COUNTRY' | translate }}*</label>
            <input id="country" type="text" formControlName="country"
                   [class.invalid]="companyForm.get('address.country')?.invalid && companyForm.get('address.country')?.touched">
          </div>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="resetForm()">
        <i class="fas fa-undo"></i> {{ 'COMMON.RESET' | translate }}
      </button>
      <button type="submit" class="btn-primary" [disabled]="companyForm.invalid">
        <i class="fas fa-save"></i> {{ 'COMMON.SAVE' | translate }}
      </button>
    </div>
  </form>
</div>
