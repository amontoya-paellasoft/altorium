<aside class="sidebar" [class.colapsado]="!ws.sidebarExpandido()">

  <!-- Cabecera del sidebar -->
  <div class="sidebar-header">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">ALTORIUM</span>
    </div>
    <button class="sidebar-toggle" (click)="ws.toggleSidebar()"
            [title]="ws.sidebarExpandido() ? 'Colapsar' : 'Expandir'">
      {{ ws.sidebarExpandido() ? '‹' : '›' }}
    </button>
  </div>

  <!-- Navegación principal -->
  <nav class="sidebar-nav">
    @for (item of navItems; track item.ruta) {
      <a class="nav-item"
         [routerLink]="item.ruta"
         routerLinkActive="activo"
         [routerLinkActiveOptions]="{ exact: item.exact }"
         [title]="item.label">
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Sección proyectos -->
  <div class="sidebar-section">
    <span class="section-title">PROYECTOS</span>
  </div>

  <div class="proyectos-lista">
    @for (proyecto of proyectos(); track proyecto.id) {

      <!-- Cabecera de la carpeta -->
      <button class="proyecto-header" (click)="toggleProyecto(proyecto.id)"
              [title]="proyecto.nombre">
        <span class="proyecto-dot" [style.background]="proyecto.color"></span>
        <span class="proyecto-nombre">{{ proyecto.nombre }}</span>
        <span class="proyecto-chevron">{{ proyecto.expandido ? '▾' : '›' }}</span>
      </button>

      <!-- Subitems de la carpeta -->
      @if (proyecto.expandido && ws.sidebarExpandido()) {
        <div class="proyecto-subitems">
          <a class="subitem" routerLink="/to-do" routerLinkActive="activo">✓ Tablero</a>
          <a class="subitem" routerLink="/configuracion" routerLinkActive="activo">⊞ Configuración (prueba)</a>
        </div>
      }
    }
  </div>

</aside>
