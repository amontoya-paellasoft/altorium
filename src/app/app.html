<div class="app-container">
  <app-header />
  <as-split direction="horizontal" class="main-content" (dragEnd)="onSplitFin($event)">
    <as-split-area [size]="50" [minSize]="25">
      <app-agent-map />
    </as-split-area>
    <as-split-area [size]="50" [minSize]="50">
      <app-chat />
    </as-split-area>
  </as-split>
  <app-control-panel />

  @for (agentId of ws.ventanasAbiertas(); track agentId) {
    <app-floating-window [agentId]="agentId" />
  }
</div>
